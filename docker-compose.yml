services:
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CORS_ORIGIN=https://brawl.weeqlash.icu
    volumes:
      - ./server/questions.enc:/app/questions.enc:ro
      - ./data:/app/data
