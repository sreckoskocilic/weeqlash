services:
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CORS_ORIGIN=https://brawl.weeqlash.icu
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server/questions.enc:/app/questions.enc:ro
      - ./data:/app/data
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save ""
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy volatile-lru
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
