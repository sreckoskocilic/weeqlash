name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint:all

      - name: Run tests
        env:
          QUESTIONS_KEY: ${{ secrets.QUESTIONS_KEY }}
          SESSION_SECRET: test-secret-for-ci
          ADMIN_SECRET: test-admin-secret-for-ci
          NODE_ENV: test
          REDIS_URL: redis://127.0.0.1:6379
        run: npm test

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e tests
        env:
          QUESTIONS_KEY: ${{ secrets.QUESTIONS_KEY }}
          SESSION_SECRET: test-secret-for-ci
          ADMIN_SECRET: test-admin-secret-for-ci
          NODE_ENV: test
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:e2e

  deploy:
    name: Deploy to Server
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/weeqlash
            git pull
            docker compose up -d --build
            docker image prune -f
            if ! diff -q /opt/weeqlash/Caddyfile /etc/caddy/Caddyfile >/dev/null 2>&1; then
              /usr/bin/caddy validate --config /opt/weeqlash/Caddyfile
              sudo cp /opt/weeqlash/Caddyfile /etc/caddy/Caddyfile
              sudo systemctl restart caddy
            fi
