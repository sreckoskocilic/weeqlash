version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      root-npm:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    groups:
      client-npm:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    groups:
      server-npm:
        patterns: ["*"]
